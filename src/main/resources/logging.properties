# Domyślna konfiguracja logów OpenGuitar (konsola).
# Uruchom z: ./play.sh  (play.sh przekazuje ten plik do JVM)
# lub: mvn javafx:run -Djava.util.logging.config.file=src/main/resources/logging.properties
#
# Więcej szczegółów (watchdog audio co klatkę): odkomentuj linię FINE poniżej.
handlers=java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%1$tT.%1$tL] %4$s %5$s%6$s%n

.level=INFO
com.openguitar.game.level=INFO
# com.openguitar.game.level=FINE
com.openguitar.beatmap.level=INFO
